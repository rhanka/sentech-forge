name: Visual Regression

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build local Sent Tech design system dependency
        run: |
          git clone --depth 1 https://github.com/rhanka/sent-tech-design-system.git ../sent-tech-design-system
          npm --prefix ../sent-tech-design-system ci
          npm --prefix ../sent-tech-design-system run build

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run visual regression
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
